<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロープレコンテスト採点システム</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F0F4F8;--surface:#FFFFFF;--surface2:#F8FAFC;
    --border:#E2E8F0;--border2:#CBD5E1;
    --text:#0F172A;--text2:#475569;--text3:#94A3B8;
    --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#BFDBFE;
    --green:#16A34A;--green-bg:#F0FDF4;--green-border:#BBF7D0;
    --amber:#D97706;--amber-bg:#FFFBEB;--amber-border:#FDE68A;
    --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FECACA;
    --radius:10px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  }
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
  #root{max-width:680px;margin:0 auto;padding:0 0 40px}
  input,textarea{font-family:inherit;font-size:14px;color:var(--text);background:var(--surface);border:1.5px solid var(--border2);border-radius:8px;padding:9px 12px;width:100%;outline:none;transition:.15s}
  input:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
  button{font-family:inherit;cursor:pointer;transition:.15s}
  input[type=range]{padding:0;border:none;background:transparent;accent-color:var(--blue)}
  details summary{cursor:pointer;list-style:none}
  details summary::-webkit-details-marker{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .spin{animation:spin .8s linear infinite;display:inline-block}
  .fadeIn{animation:fadeIn .2s ease}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:hover{background:#1D4ED8}
  .btn-outline{background:var(--surface);color:var(--text);border:1.5px solid var(--border2)}
  .btn-outline:hover{background:var(--surface2);border-color:var(--text3)}
  .btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
  .badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
  .badge-kaitori{background:var(--amber-bg);color:var(--amber)}
  .badge-hanbai{background:var(--blue-bg);color:var(--blue)}
  .badge-success{background:var(--green-bg);color:var(--green)}
  .badge-gray{background:var(--surface2);color:var(--text2)}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue);overflow:hidden;flex-shrink:0}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .tabs{display:flex;gap:6px;padding:0 20px;margin-bottom:0}
  .tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:9px;background:var(--surface);color:var(--text2);font-size:13px;font-weight:500}
  .tab.active{background:var(--blue-bg);border-color:var(--blue-border);color:var(--blue);font-weight:600}
  .score-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:8px}
  .score-bar-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .2s}
  .note-row{display:flex;gap:6px;align-items:flex-start;font-size:12px;margin-top:4px}
  .note-label{background:var(--blue-bg);color:var(--blue);padding:1px 7px;border-radius:9px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}

  /* Login page */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#EFF6FF 0%,#F0FDF4 100%)}
  .login-card{background:var(--surface);border-radius:20px;padding:36px 32px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1);text-align:center}
  .oauth-btn{width:100%;padding:12px;border-radius:10px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer}
  .oauth-btn:hover{background:var(--surface2)}
  .oauth-btn.google{border-color:#EA4335;color:#EA4335}
  .oauth-btn.google:hover{background:#FEF2F2}

  /* Responsive */
  @media(max-width:520px){
    #root{padding:0 0 60px}
    .topbar{padding:10px 14px}
  }
</style>
</head>
<body>
<div id="root"></div>

<script>

const e=React.createElement;

// ─── Supabase ────────────────────────────────────────────────
const SB_URL="https://hcqjfylgsxbiglpnwgyp.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhjcWpmeWxnc3hiaWdscG53Z3lwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NDkyNDIsImV4cCI6MjA5NzQyNTI0Mn0.l3Avkl5UJaj0XSWkHfdOTYCv7-rx94QtNpquNV0X6oY";
const sbClient=window.supabase.createClient(SB_URL,SB_KEY,{auth:{flowType:'pkce',autoRefreshToken:true,detectSessionInUrl:true}});

async function sbQ(table,query={}){
  let q=sbClient.from(table).select(query.select||"*");
  if(query.eq)Object.entries(query.eq).forEach(([k,v])=>q=q.eq(k,v));
  if(query.order)q=q.order(query.order,{ascending:true});
  const {data,error}=await q;
  if(error)throw error;
  return data;
}
async function sbInsert(table,body){
  const {data,error}=await sbClient.from(table).insert(body).select();
  if(error)throw error;
  return data;
}
async function sbDelete(table,id){
  const {error}=await sbClient.from(table).delete().eq("id",id);
  if(error)throw error;
}
async function sbUpdate(table,id,body){
  const {data,error}=await sbClient.from(table).update(body).eq("id",id).select();
  if(error)throw error;
  return data;
}
async function sbDeleteScores(participantId){
  const {error}=await sbClient.from("rp_scores").delete().eq("participant_id",participantId);
  if(error)throw error;
}
async function sbUpsert(table,body,conflict){
  const {data,error}=await sbClient.from(table).upsert(body,{onConflict:conflict}).select();
  if(error)throw error;
  return data;
}

// ─── Criteria ────────────────────────────────────────────────
const CRITERIA={

    {id:"c5",num:"⑤",title:"お客様への配慮",tag:"気遣い・温かみ",max:20,desc:"表情・間・トーンに温かみがあり、安心して話せる空気を作れているか。",notes:[["🖥 WEB","ラグや聞き取りに配慮し反応を確認"],["🤝 対面","目線・距離感・空間への気遣い"]]},
    {id:"c6",num:"⑥",title:"締め・感謝の言葉",tag:"印象・信頼",max:20,desc:"最後に丁寧な感謝を伝え、ポジティブな印象で終われているか。次のステップへの雰囲気をつくれているか。",notes:[]}
  ],
  hanbai:[
    {id:"c1",num:"①",title:"第一印象・挨拶",tag:"清潔感・安心感",max:20,desc:"明るく自然な笑顔とトーンで安心感を与え、信頼できる第一印象をつくれているか。",notes:[["🖥 WEB","カメラ越しの表情・背景"],["🤝 対面","入室時の笑顔・立ち居振る舞い"]]},
    {id:"c2",num:"②",title:"コミュニケーション姿勢",tag:"傾聴・共感",max:20,desc:"相手の話を遮らず、うなずきや相槌で共感を示し、寄り添った対話ができているか。",notes:[]},
    {id:"c3",num:"③",title:"説明のわかりやすさ",tag:"誠実・透明性",max:20,desc:"専門用語を避け、質問を通じてお客様のニーズや想いを丁寧に引き出せているか。",notes:[]},
    {id:"c4",num:"④",title:"提案の姿勢・信頼感",tag:"誠実さ・一貫性",max:20,desc:"販売目的ではなく、お客様の立場に立った誠実な提案・説明ができているか。",notes:[]},
    {id:"c5",num:"⑤",title:"雰囲気づくり・温かみ",tag:"親しみ・心地よさ",max:20,desc:"明るい笑顔・柔らかい表情・自然なユーモアで安心して話せる雰囲気を作れているか。",notes:[["🖥 WEB","画面越しでも自然な温かみ"],["🤝 対面","空間全体の雰囲気づくり"]]},
    {id:"c6",num:"⑥",title:"締め・感謝の言葉",tag:"信頼・印象",max:20,desc:"丁寧な感謝を伝え、ポジティブで信頼感のある印象で終われているか。",notes:[]}
  ]
};
const PL={kaitori:"買取",hanbai:"販売"};
const totSc=(sc,pat)=>(CRITERIA[pat]||CRITERIA.kaitori).reduce((s,c)=>s+(sc[c.id]||0),0);
function toEmbed(url){if(!url)return null;const d=url.match(/drive\.google\.com\/file\/d\/([^/?#\s]+)/);if(d)return`https://drive.google.com/file/d/${d[1]}/preview`;const y=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\s]+)/);if(y)return`https://www.youtube.com/embed/${y[1]}`;return url;}

// ─── UI helpers ──────────────────────────────────────────────
function Spinner({size=16}){return e("i",{className:"ti ti-loader-2 spin",style:{fontSize:size}})}
function PatBadge({pat,size=11}){return e("span",{className:`badge badge-${pat}`},PL[pat])}
function ModeTag({t}){const m={online:"🖥 WEB",offline:"🤝 対面",hybrid:"🔀 ハイブリッド"};return e("span",{style:{fontSize:11,color:"var(--text3)"}},m[t]||"")}
function BackBtn({onClick,label="ホーム"}){
  return e("button",{onClick,className:"btn btn-outline",style:{padding:"7px 14px",fontSize:13}},
    e("i",{className:"ti ti-arrow-left",style:{fontSize:14}}),label
  );
}

// ─── Score Row ───────────────────────────────────────────────
function ScoreRow({c,value,onChange}){
  const pct=(value/c.max)*100;
  return e("div",{className:"card",style:{marginBottom:10}},
    e("div",{style:{display:"flex",gap:10,marginBottom:10}},
      e("span",{style:{fontSize:18,lineHeight:"22px",minWidth:26}},c.num),
      e("div",{style:{flex:1}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:3}},
          e("span",{style:{fontWeight:600,fontSize:14}},c.title),
          e("span",{className:"badge badge-gray"},c.tag)
        ),
        e("p",{style:{fontSize:12,color:"var(--text2)",lineHeight:1.6,margin:0}},c.desc),
        c.notes.length>0&&e("div",{style:{marginTop:6,display:"flex",flexDirection:"column",gap:3}},
          c.notes.map(([l,t],i)=>e("div",{key:i,className:"note-row"},
            e("span",{className:"note-label"},l),
            e("span",{style:{color:"var(--text2)"}},t)
          ))
        )
      )
    ),
    e("div",{style:{display:"flex",alignItems:"center",gap:10}},
      e("input",{type:"range",min:0,max:c.max,value:value,onChange:v=>onChange(Number(v.target.value)),step:1,style:{flex:1}}),
      e("div",{style:{minWidth:56,textAlign:"center"}},
        e("span",{style:{fontSize:20,fontWeight:700,color:"var(--blue)"}},value),
        e("span",{style:{fontSize:11,color:"var(--text3)"}},"/"+c.max)
      ),
      e("div",{style:{display:"flex",gap:4}},
        e("button",{onClick:()=>onChange(Math.max(0,value-1)),style:{width:28,height:28,border:"1px solid var(--border2)",borderRadius:6,background:"var(--surface2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}},e("i",{className:"ti ti-minus",style:{fontSize:13}})),
        e("button",{onClick:()=>onChange(Math.min(c.max,value+1)),style:{width:28,height:28,border:"1px solid var(--border2)",borderRadius:6,background:"var(--surface2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}},e("i",{className:"ti ti-plus",style:{fontSize:13}}))
      )
    ),
    e("div",{className:"score-bar"},e("div",{className:"score-bar-fill",style:{width:pct+"%"}}))
  );
}

// ─── AI Scoring ──────────────────────────────────────────────
async function callAI(pattern,obs){
  const crit=CRITERIA[pattern];
  const prompt=`あなたは営業ロールプレイコンテストの審査補助AIです。審査員の観察メモをもとに、各採点項目のスコア（0〜20点）と総評を提案してください。\n【パターン】${PL[pattern]}\n【採点項目】\n${crit.map(c=>`${c.num} ${c.title}（${c.tag}）: ${c.desc}`).join("\n")}\n【観察メモ】\n${obs}\n\n以下のJSON形式のみで回答（前置き不要）:\n{"c1":15,"c2":17,"c3":14,"c4":16,"c5":18,"c6":15,"comment":"総評"}`;
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
  const data=await res.json();
  return JSON.parse(data.content[0].text.trim().replace(/```json|```/g,"").trim());
}

// ─── Admin Screen ─────────────────────────────────────────────
function AdminScreen({setScreen,participants,setParticipants,allScores,setAllScores}){
  const [nm,setNm]=useState("");const[url,setUrl]=useState("");const[mtype,setMtype]=useState("online");const[pat,setPat]=useState("kaitori");const[saving,setSaving]=useState(false);const[msg,setMsg]=useState({text:"",ok:true});
  const [editId,setEditId]=useState(null);
  const [editNm,setEditNm]=useState("");const[editUrl,setEditUrl]=useState("");const[editMtype,setEditMtype]=useState("online");const[editPat,setEditPat]=useState("kaitori");const[editSaving,setEditSaving]=useState(false);

  async function add(){
    if(!nm.trim())return;
    setSaving(true);
    try{
      const r=await sbInsert("rp_participants",{name:nm.trim(),url:url.trim(),type:mtype,pattern:pat});
      setParticipants(prev=>[...prev,...r]);
      setNm("");setUrl("");setMsg({text:"追加しました",ok:true});setTimeout(()=>setMsg({text:"",ok:true}),2500);
    }catch(err){setMsg({text:"エラー: "+err.message,ok:false});}
    setSaving(false);
  }
  async function remove(id){
    if(!confirm("この参加者を削除しますか？"))return;
    try{await sbDelete("rp_participants",id);setParticipants(prev=>prev.filter(p=>p.id!==id));}
    catch(err){alert("削除エラー: "+err.message);}
  }
  function startEdit(p){setEditId(p.id);setEditNm(p.name);setEditUrl(p.url||"");setEditMtype(p.type||"online");setEditPat(p.pattern||"kaitori");}
  async function saveEdit(){
    if(!editNm.trim())return;
    setEditSaving(true);
    try{
      await sbUpdate("rp_participants",editId,{name:editNm.trim(),url:editUrl.trim(),type:editMtype,pattern:editPat});
      setParticipants(prev=>prev.map(p=>p.id===editId?{...p,name:editNm.trim(),url:editUrl.trim(),type:editMtype,pattern:editPat}:p));
      setEditId(null);
    }catch(err){alert("更新エラー: "+err.message);}
    setEditSaving(false);
  }
  async function deleteScores(pid,pname){
    if(!confirm(`「${pname}」の採点データをすべて削除しますか？`))return;
    try{
      await sbDeleteScores(pid);
      setAllScores(prev=>{const n={...prev};delete n[pid];return n;});
    }catch(err){alert("エラー: "+err.message);}
  }
  const judgeCount=(pid)=>Object.keys(allScores[pid]||{}).length;
  return e("div",{className:"fadeIn",style:{padding:"0 20px"}},
    e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingTop:16}},
      e(BackBtn,{onClick:()=>setScreen("home")}),
      e("h2",{style:{fontSize:18,fontWeight:700,flex:1}},"管理者設定"),
      e("span",{className:"badge badge-success"},e("i",{className:"ti ti-lock-open",style:{fontSize:11,marginRight:3}}),"認証済み")
    ),
    e("div",{className:"card",style:{marginBottom:12}},
      e("h3",{style:{fontSize:15,fontWeight:600,marginBottom:14}},"参加者を追加"),
      e("div",{style:{display:"flex",flexDirection:"column",gap:10}},
        e("div",null,
          e("label",{style:{fontSize:12,color:"var(--text2)",display:"block",marginBottom:4}},"ロープレパターン *"),
          e("div",{style:{display:"flex",gap:6}},
            ["kaitori","hanbai"].map(v=>e("button",{key:v,onClick:()=>setPat(v),style:{flex:1,padding:"9px",border:`1.5px solid ${pat===v?"var(--blue)":"var(--border2)"}`,borderRadius:9,background:pat===v?"var(--blue-bg)":"var(--surface)",color:pat===v?"var(--blue)":"var(--text2)",fontWeight:pat===v?600:400,cursor:"pointer",fontSize:14}},PL[v]))
          )
        ),
        e("div",null,e("label",{style:{fontSize:12,color:"var(--text2)",display:"block",marginBottom:4}},"参加者名 *"),e("input",{value:nm,onChange:v=>setNm(v.target.value),placeholder:"例：田中 花子",onKeyDown:v=>v.key==="Enter"&&add()})),
        e("div",null,e("label",{style:{fontSize:12,color:"var(--text2)",display:"block",marginBottom:4}},"動画URL（Google Drive / YouTube）"),e("input",{value:url,onChange:v=>setUrl(v.target.value),placeholder:"https://drive.google.com/file/d/..."})),
        e("div",null,
          e("label",{style:{fontSize:12,color:"var(--text2)",display:"block",marginBottom:4}},"発表形式"),
          e("div",{style:{display:"flex",gap:6}},
            [["online","🖥 WEB"],["offline","🤝 対面"],["hybrid","🔀 ハイブリッド"]].map(([v,l])=>e("button",{key:v,onClick:()=>setMtype(v),style:{flex:1,padding:"7px 4px",border:`1.5px solid ${mtype===v?"var(--blue)":"var(--border2)"}`,borderRadius:8,background:mtype===v?"var(--blue-bg)":"var(--surface)",color:mtype===v?"var(--blue)":"var(--text2)",fontWeight:mtype===v?600:400,cursor:"pointer",fontSize:12}},l))
          )
        ),
        msg.text&&e("div",{style:{padding:"8px 12px",borderRadius:8,background:msg.ok?"var(--green-bg)":"var(--red-bg)",color:msg.ok?"var(--green)":"var(--red)",fontSize:13}},msg.text),
        e("button",{onClick:add,disabled:saving,className:"btn btn-primary",style:{width:"100%",padding:"11px",justifyContent:"center"}},saving?e(Spinner):null,"追加する")
      )
    ),
    e("div",{className:"card"},
      e("h3",{style:{fontSize:15,fontWeight:600,marginBottom:14}},"参加者一覧（"+participants.length+"名）"),
      participants.length===0
        ?e("p",{style:{color:"var(--text3)",textAlign:"center",padding:"20px 0",fontSize:14}},"まだ参加者が登録されていません")
        :participants.map((p,i)=>{

// ─── Results Screen ──────────────────────────────────────────
function ResultsScreen({setScreen,participants,allScores,setAllScores}){
  const [tab,setTab]=useState("all");const[loading,setLoading]=useState(false);

// ─── App ──────────────────────────────────────────────────────
function App(){
  const [session,setSession]=useState(undefined);
  const [isAdmin,setIsAdmin]=useState(false);
  const [participants,setParticipants]=useState([]);
  const [allScores,setAllScores]=useState({});
  const [screen,setScreen]=useState("home");
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sbClient.auth.getSession().then(({data:{session}})=>{
      setSession(session);
      if(session)init(session);
      else setLoading(false);
    });
    const {data:{subscription}}=sbClient.auth.onAuthStateChange((_,session)=>{
      setSession(session);
      if(session)init(session);
      else{setLoading(false);setIsAdmin(false);}
    });
    return ()=>subscription.unsubscribe();
  },[]);

  async function init(sess){
    setLoading(true);
    try{
      const [ps,sc,adminRows]=await Promise.all([
        sbQ("rp_participants",{order:"created_at"}),
        sbQ("rp_scores",{select:"*"}),
        sbQ("rp_admins",{eq:{email:sess.user.email}})
      ]);
      setParticipants(ps||[]);
      const map={};(sc||[]).forEach(r=>{if(!map[r.participant_id])map[r.participant_id]={};map[r.participant_id][r.judge_name]={scores:r.scores,comment:r.comment};});
      setAllScores(map);
      setIsAdmin((adminRows||[]).length>0);
    }catch(err){console.error(err);}
    setLoading(false);
  }

  async function logout(){
    await sbClient.auth.signOut();
    setScreen("home");setIsAdmin(false);
  }

  if(session===undefined||loading){
    return e("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"var(--text2)"}},
      e(Spinner,{size:28}),e("p",{style:{fontSize:14}},"読み込み中…")
    );
  }
  if(!session)return e(LoginScreen);

  const props={setScreen,participants,setParticipants,allScores,setAllScores,isAdmin,user:session.user};
  return e("div",null,
    e(Topbar,{user:session.user,onLogout:logout}),
    e("div",null,
      screen==="home"&&e(HomeScreen,props),
      screen==="admin"&&(isAdmin?e(AdminScreen,props):e(HomeScreen,props)),
      screen==="judge"&&e(JudgeScreen,props),
      screen==="results"&&(isAdmin?e(ResultsScreen,props):e(HomeScreen,props))
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
</html>
